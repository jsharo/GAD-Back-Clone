# Render Blueprint — GAD Cañar API
# New → Blueprint → conectar https://github.com/jsharo/GAD-Back-Clone
#
# Nota: el plan free NO soporta preDeployCommand; las migraciones
# corren al arrancar (startCommand).

services:
  - type: web
    name: gad-back-clone
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: gad-back-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false
      - key: SENDGRID_FROM_NAME
        value: GAD Municipal de Cañar
      - key: IPFS_ENABLED
        value: "false"
      - key: BLOCKCHAIN_ENABLED
        value: "false"

databases:
  - name: gad-back-db
    plan: free
    databaseName: gad_canar
    user: gad
    postgresMajorVersion: "16"
